    <style>
        :root { --vanilla:#f6e8c3; }
        body { font-family: sans-serif; margin:15px; line-height:1.6; }
        h2{ margin-bottom:10px; }
        .major{ margin-bottom:50px; padding:15px; border:2px solid var(--vanilla); border-radius:12px; background:#fffdf6; }
        .minor{ margin-top:20px; padding:15px; border:1px solid #ddd; border-radius:10px; }
        button{ background:var(--vanilla); border:none; padding:10px 14px; border-radius:8px; font-size:16px; }
        label{ display:block; margin:6px 0; }
        .result{ margin-top:10px; font-weight:bold; }
        .image-box{ margin:15px 0; text-align:center; }
        .image-box img{ max-width:100%; height:auto; border-radius:8px; }
        .truefalse-container{ display:flex; margin-top:15px; }
        .truefalse-container button{ flex:1; font-size:20px; padding:18px; }
        .truefalse-container button:first-child{ border-right:1px solid #ddd; }
        select{ width:100%; padding:10px; font-size:16px; border-radius:8px; border:1px solid #ccc; }
        #resultBox{ text-align:center; margin-top:40px; }
        #accuracy{ font-size:40px; font-weight:bold; color:#f3e5ab; }
        #score{ font-size:24px; margin-top:10px; }
        .wordbank{ margin-top:25px; padding:12px; border:1px dashed #ccc; border-radius:10px; background:#fffdf6; }
        .wordbank-title{ font-weight:bold; margin-bottom:8px; }
        .wordbank span{ display:inline-block; margin:4px 6px; padding:6px 10px; background:var(--vanilla); border-radius:6px; font-size:14px; }
        .errorBox { margin-top:20px; padding:10px; border:1px solid #f99; background:#fff0f0; color:#900; border-radius:8px; }
    </style>
</head>

        // エラーをページ上に表示する（デバッグ用）
        function showError(e) {
            const area = document.getElementById('errorArea');
            if (!area) return;
            const box = document.createElement('div');
            box.className = 'errorBox';
            box.textContent = 'スクリプト実行でエラーが発生しました: ' + (e && e.message ? e.message : String(e));
            area.appendChild(box);
            console.error(e);
        }

        function updateScore() {
            let totalQ = 0;
            quizData.forEach(major => { totalQ += major.questions.length; });
            const accuracy = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);
            // iOSでの表示更新を確実にするため
            document.getElementById("accuracy").innerText = "正解率: " + accuracy + "%";
            document.getElementById("score").innerText = "正解数: " + correctCount + " / " + totalQ;
        }

        function scrollNext(i) {
            try {
                if (!document.getElementById("scrollToggle").checked) return;
                const next = document.getElementById("minor-" + (i + 1));
                if (next) next.scrollIntoView({ behavior: "smooth", block: "center" });
            } catch (e) {
                // 無視して進める
                console.warn(e);
            }
        }

        function createQuiz() {
            try {
                const container = document.getElementById("quiz-container");
                if (!container) return;
                container.innerHTML = "";
                let globalIndex = 0;

                quizData.forEach(major => {
                    const majorDiv = document.createElement("div");
                    majorDiv.className = "major";

                    const title = document.createElement("h3");
                    title.textContent = major.title || "";
                    majorDiv.appendChild(title);

                    if (Array.isArray(major.wordbank) && major.wordbank.length > 0) {
                        const bank = document.createElement("div");
                        bank.className = "wordbank";
                        const bTitle = document.createElement("div");
                        bTitle.className = "wordbank-title";
                        bTitle.textContent = "語群";
                        bank.appendChild(bTitle);
                        major.wordbank.forEach(w => {
                            const span = document.createElement("span");
                            span.textContent = w;
                            bank.appendChild(span);
                        });
                        majorDiv.appendChild(bank);
                    }

                    if (!Array.isArray(major.questions)) major.questions = [];

                    major.questions.forEach(q => {
                        const minor = document.createElement("div");
                        minor.className = "minor";
                        minor.id = "minor-" + globalIndex;

                        const qTitle = document.createElement("h4");
                        qTitle.textContent = q.question || "";
                        minor.appendChild(qTitle);

                        const result = document.createElement("div");
                        result.className = "result";

                        // チェックボックス（CB）
                        if (major.type === "CB") {
                            if (!Array.isArray(major.wordbank)) major.wordbank = [];
                            major.wordbank.forEach((opt, i) => {
                                const lbl = document.createElement("label");
                                const inp = document.createElement("input");
                                inp.type = "checkbox";
                                inp.value = i;
                                lbl.appendChild(inp);
                                lbl.append(" " + opt);
                                minor.appendChild(lbl);
                            });
                            const btn = document.createElement("button");
                            btn.textContent = "答え合わせ";
                            const currentIndex = globalIndex;
                            btn.onclick = () => {
                                try {
                                    const checked = [];
                                    minor.querySelectorAll("input:checked").forEach(i => checked.push(Number(i.value)));
                                    const expected = Array.isArray(q.answers) ? q.answers : [];
                                    const ok = checked.length === expected.length && checked.every(v => expected.includes(v));
                                    if (ok) {
                                        result.textContent = "正解！";
                                        correctCount++;
                                        scrollNext(currentIndex);
                                    } else {
                                        result.textContent = "不正解";
                                    }
                                    totalCount++;
                                    updateScore();
                                } catch (e) { showError(e); }
                            };
                            minor.appendChild(btn);

                        // 選択（CH）
                        } else if (major.type === "CH") {
                            const sel = document.createElement("select");
                            const def = document.createElement("option");
                            def.textContent = "選択してね！";
                            def.value = "";
                            def.selected = true;
                            sel.appendChild(def);
                            if (Array.isArray(major.wordbank)) {
                                major.wordbank.forEach((opt, i) => {
                                    const o = document.createElement("option");
                                    o.value = i;
                                    o.textContent = opt;
                                    sel.appendChild(o);
                                });
                            }
                            minor.appendChild(sel);

                            const btn = document.createElement("button");
                            btn.textContent = "答え合わせ";
                            const currentIndex = globalIndex;
                            btn.onclick = () => {
                                try {
                                    if (sel.value === "") {
                                        result.textContent = "選択してね！";
                                        return;
                                    }
                                    const selIndex = Number(sel.value);
                                    if (selIndex === q.answer) {
                                        result.textContent = "正解！";
                                        correctCount++;
                                        scrollNext(currentIndex);
                                    } else {
                                        result.textContent = "不正解";
                                    }
                                    totalCount++;
                                    updateScore();
                                } catch (e) { showError(e); }
                            };
                            minor.appendChild(btn);

                        // OX
                        } else if (major.type === "OX") {
                            const box = document.createElement("div");
                            box.className = "truefalse-container";
                            const btnO = document.createElement("button");
                            btnO.textContent = "⭕";
                            const btnX = document.createElement("button");
                            btnX.textContent = "❌";
                            const currentIndex = globalIndex;
                            btnO.onclick = () => {
                                try {
                                    if (q.answer === true) { result.textContent = "正解！"; correctCount++; scrollNext(currentIndex); }
                                    else { result.textContent = "不正解"; }
                                    totalCount++; updateScore();
                                } catch (e) { showError(e); }
                            };
                            btnX.onclick = () => {
                                try {
                                    if (q.answer === false) { result.textContent = "正解！"; correctCount++; scrollNext(currentIndex); }
                                    else { result.textContent = "不正解"; }
                                    totalCount++; updateScore();
                                } catch (e) { showError(e); }
                            };
                            box.appendChild(btnO); box.appendChild(btnX);
                            minor.appendChild(box);
                        }

                        minor.appendChild(result);
                        majorDiv.appendChild(minor);
                        globalIndex++;
                    });

                    container.appendChild(majorDiv);
                });

                updateScore();
            } catch (e) {
                showError(e);
            }
        }

        // DOM が使えるようになってから確実に実行
        document.addEventListener('DOMContentLoaded', () => {
            try {
                createQuiz();
            } catch (e) {
                showError(e);
            }
        });
    </script>
</body>

</html>
